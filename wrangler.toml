name = "sso-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Production Supabase (remote) — used when deploying
SUPABASE_URL = "https://quvdgaydpctuspzeqknc.supabase.co"
ALLOWED_ORIGINS = "http://localhost:3000,http://localhost:5173,http://localhost:8788,https://*.rareminds.in,https://*.pages.dev,http://127.0.0.1:8788"
ALLOWED_APP_URLS = "http://localhost:3000,http://localhost:5173,https://skillpassport.rareminds.in,https://*.rareminds.in,https://*.pages.dev"

# Local development overrides — wrangler dev reads .dev.vars for secrets
# and this section for vars. Override SUPABASE_URL for local dev by
# adding it to .dev.vars (wrangler dev vars override wrangler.toml vars).
# Local SSO DB:  postgresql://postgres:postgres@127.0.0.1:54332/postgres
# Local API URL: http://127.0.0.1:54331
# Local Studio:  http://127.0.0.1:54333

# Secrets (set via `wrangler secret put`):
# SUPABASE_SERVICE_ROLE_KEY
# JWT_PRIVATE_KEY  (PEM-encoded RS256 private key)
# JWT_PUBLIC_KEY   (PEM-encoded RS256 public key)
# JWT_KID          (Key ID for JWKS, e.g. "key-1")
# EMAIL_API_KEY    (Shared API key for email-worker service binding)

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "6f54bab45fd840678dde620cd1518705"

[[services]]
binding = "EMAIL_SERVICE"
service = "shared-email-api"

[triggers]
crons = ["0 3 * * *"]
