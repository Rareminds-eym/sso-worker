name = "sso-api"
main = "src/index.ts"
compatibility_date = "2026-05-25"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8787

[observability]
enabled = true

[observability.logs]
head_sampling_rate = 1

[observability.traces]
enabled = true
head_sampling_rate = 0.01

# ============================================================================
# DEV — wrangler deploy (default, no --env flag)
# Deploys as: sso-api
# ============================================================================

[vars]
ENVIRONMENT = "dev"
# ⚠️ Replace with dev SSO-auth Supabase project URL
SUPABASE_URL = "https://<DEV_SSO_SUPABASE_PROJECT>.supabase.co"
ALLOWED_ORIGINS = "http://localhost:3000,http://localhost:5173,http://localhost:8788,https://*.rareminds.in,https://*.pages.dev,http://127.0.0.1:8788,https://dev.skillpassports.com"
ALLOWED_APP_URLS = "http://localhost:3000,http://localhost:5173,http://localhost:8788,http://127.0.0.1:8788,https://*.rareminds.in,https://*.pages.dev,https://dev.skillpassports.com"
SKILLPASSPORT_URL = "https://dev.skillpassports.com"

# Local development overrides — wrangler dev reads .dev.vars for secrets
# and this section for vars. Override SUPABASE_URL for local dev by
# adding it to .dev.vars (wrangler dev vars override wrangler.toml vars).
# Local SSO DB:  postgresql://postgres:postgres@127.0.0.1:54332/postgres
# Local API URL: http://127.0.0.1:54331
# Local Studio:  http://127.0.0.1:54333

# Secrets (set via `wrangler secret put`):
# SUPABASE_SERVICE_ROLE_KEY
# JWT_PRIVATE_KEY  (PEM-encoded RS256 private key)
# JWT_PUBLIC_KEY   (PEM-encoded RS256 public key)
# JWT_KID          (Key ID for JWKS, e.g. "key-1")
# EMAIL_API_KEY    (Shared API key for email-worker service binding)

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a01a250ae61941a6adb3b4c702b6ea2f"

[[services]]
binding = "EMAIL_SERVICE"
service = "shared-email-api"


# Queue for pushing auth DB sync events to SkillPassport
[[queues.producers]]
binding = "SYNC_QUEUE"
queue = "auth-db-sync-queue-dev"

# Consumer for generic webhook events
[[queues.consumers]]
queue = "payment-webhooks-queue-dev"
max_batch_size = 10
max_batch_timeout = 5

# Consumer for reverse metadata sync from apps
[[queues.consumers]]
queue = "sso-reverse-sync-queue-dev"
max_batch_size = 10
max_batch_timeout = 5

