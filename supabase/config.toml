# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "sso-auth"

[api]
enabled = true

# Port to use for the API URL.
# Using 54331 to avoid conflict with skillpassport (54321)
port = 54331

schemas = [
  "public",
  "graphql_public",
]

extra_search_path = [
  "public",
  "extensions",
]

max_rows = 1000

[api.tls]
enabled = false

[db]
# Port to use for the local database URL.
# Using 54332 to avoid conflict with skillpassport (54322)
port = 54332

# Port used by db diff command to initialize the shadow database.
shadow_port = 54330

# Keep aligned with remote database version
major_version = 17

[db.pooler]
enabled = false

port = 54339
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true

# Port to use for Supabase Studio.
# Using 54333 to avoid conflict with skillpassport (54323)
port = 54333

api_url = "http://127.0.0.1"

[inbucket]
enabled = true

# Port to use for the email testing server web interface.
# Using 54334 to avoid conflict with skillpassport (54324)
port = 54334

[storage]
enabled = false

[auth]
enabled = true

# The SSO worker handles its own auth — Supabase auth is disabled
# (the sso-worker uses the DB directly via service_role)
site_url = "http://127.0.0.1:8787"

additional_redirect_urls = ["http://127.0.0.1:8787/**", "http://localhost:8787/**"]

jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 6
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8084
deno_version = 2

[analytics]
enabled = true

# Using 54337 to avoid conflict with skillpassport (54327)
port = 54337
backend = "postgres"
